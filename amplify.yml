version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22
        - cd frontend
        - npm install
    build:
      commands:
        # Use relative API path — Amplify will proxy to the ALB backend
        - REACT_APP_API_URL="/api" REACT_APP_DEV_BYPASS_AUTH=false npm run build
  artifacts:
    baseDirectory: frontend/build
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*

  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Strict-Transport-Security
          value: max-age=31536000; includeSubDomains
        - key: X-Content-Type-Options
          value: nosniff
        - key: X-Frame-Options
          value: DENY
        - key: Cache-Control
          value: no-store

  rewrites:
    # Reverse proxy all /api/* requests to the HTTP ALB backend.
    # This solves the mixed content issue (HTTPS Amplify → HTTP ALB internally).
    - source:    '/api/<*>'
      target:    'http://chalokisaan-alb-229245969.ap-south-1.elb.amazonaws.com/api/<*>'
      status:    '200'
      condition: null

    # SPA fallback — all non-asset, non-api paths serve index.html
    - source:    '</^[^.]+$|\.(?!(css|gif|ico|jpg|jpeg|js|png|txt|svg|woff|woff2|ttf|map|json)$)([^.]+$)/>'
      target:    '/index.html'
      status:    '200'
      condition: null
