
services:
  postgres:
    image: postgres:16-alpine
    container_name: chalokisaan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     kisaan_admin
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB:       chalo_kisaan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Optional: pgAdmin web UI at http://localhost:5050
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chalokisaan-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@chalokisaan.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
